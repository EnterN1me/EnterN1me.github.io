		function main(){

		function getRandomInt(max) {
  return Math.floor(Math.random() * max);
}
			
		function load(){
		let canvas = document.getElementById('id');
		canvas.height = Math.min(canvas.width,canvas.height);
		canvas.width = canvas.height;
		let ctx = canvas.getContext('2d');
		let image = document.getElementById('sunset');

    ctx.drawImage(image, 0, 0, 512, 512);
}
	
		function criptage(){
			var ctx = document.getElementById('id').getContext('2d');
			var imageDataSource = ctx.getImageData(0,0,512,512);
			
			var imageDataResult = ctx.createImageData(512,512);
			
			var string ="";
			
			for (var i =0, l=imageDataSource.data.length;i<l;i=i+4){
				string+=imageDataSource.data[i];
				string+=";";
				string+=imageDataSource.data[i+1];
				string+=";";
				string+=imageDataSource.data[i+2];
				string+=";";
				string+=imageDataSource.data[i+3];
				string+=";";
				}
			//var pixelArray = imgd.data;
			//var encrypted = canvasArrToString(pixelArray);
			document.getElementById('mytextarea').value= string ;
			}
            
		function decrypte(string){
			var ctx = document.getElementById('id').getContext('2d');
			var imageDataSource = ctx.getImageData(0,0,512,512);
			
			var myArray = string.split(";");
			var pxData = imageDataSource.data;

			for ( var i = 0; i <= myArray.length; i++ ) {
				pxData[i] = myArray[i];
			}

			pxData = new Uint8ClampedArray(pxData);
			imageDataSource.data.set(pxData);
			ctx.putImageData(imageDataSource, 0, 0);
}
			
		
	</script>
